services:
  api:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /workspace
    command: >-
      bash -lc "uv sync --all-groups && uv run uvicorn apps.api.app.main:create_app --factory --host ${API_HOST:-0.0.0.0} --port ${API_PORT:-8000} --reload"
    env_file:
      - ../../.env
    volumes:
      - ../../:/workspace
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${API_PORT:-8000}:${API_PORT:-8000}"

  worker:
    image: ghcr.io/astral-sh/uv:python3.12-bookworm-slim
    working_dir: /workspace
    command: >-
      bash -lc "uv sync --all-groups && uv run python -m apps.worker.app.main"
    env_file:
      - ../../.env
    volumes:
      - ../../:/workspace
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-template}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-template}
      POSTGRES_DB: ${POSTGRES_DB:-template}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-template} -d ${POSTGRES_DB:-template}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
